services:
  # API Backend
  - type: web
    name: college-counselor-api
    env: python
    region: oregon
    plan: free
    buildCommand: "cd api && pip install -r requirements.txt"
    startCommand: "cd api && uvicorn server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: USE_LOCAL_MODEL
        value: false
      - key: PYTHON_VERSION
        value: 3.12.0

  # Frontend
  - type: web
    name: college-counselor-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: college-counselor-api
          property: host
